<!doctype html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    {% include header.html %}

    <main id="main-content" class="container">
      <article class="blog-post">
        <header class="post-header">
          <h1>{{ page.title }}</h1>
          <p class="post-meta">
            {{ page.date | date: "%B %d, %Y" }}
            {% assign words = content | number_of_words %}{% assign mins = words | plus: 199 | divided_by: 200 %}· {{ mins }} min read
          </p>
        </header>

        <div class="post-content">
          {{ content }}
        </div>

        <footer class="post-footer">
          <a href="{{ '/blog.html' | relative_url }}" class="btn">&larr; Back to Blog</a>
        </footer>
      </article>
    </main>

    {% include footer.html %}
  </body>
</html>
