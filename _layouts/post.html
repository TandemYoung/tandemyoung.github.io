<!doctype html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>
  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    {% include header.html %}
    {% include nav.html %}

    <div id="main-content" class="container">
      <article class="blog-post">
        <header class="post-header">
          <h2>{{ page.title }}</h2>
          <p class="post-meta">
            {{ page.date | date: "%B %d, %Y" }}
            <span class="reading-time"></span>
          </p>
        </header>

        <div class="post-content">
          {{ content }}
        </div>

        <footer class="post-footer">
          <a href="{{ '/blog.html' | relative_url }}" class="btn">&larr; Back to Blog</a>
        </footer>
      </article>
    </div>

    {% include footer.html %}
  </body>
</html>
